id: F-037
title: Claude-Auth-Health — Ablauf der Container-Anmeldung erkennen, bevor ein Job
  startet
goal: 'Die Container-claude-Anmeldung (CLAUDE_CODE_OAUTH_TOKEN) kann ablaufen; heute
  merkt das niemand, bis ein Lauf mit 401 scheitert. Stufe 2: ein leichtgewichtiger
  Auth-Probe prueft beim Boot UND periodisch (konfigurierbares Intervall, setTimeout-Kette
  wie NightWatchScheduler, injizierbare Timer), ob sich claude headless anmelden kann.
  401 -> Zustand expired; Erfolg -> ok; sonstiger Fehler -> unknown (kein Fehlalarm).
  Status-Endpunkt (ohne Token-Wert) + Panel-Badge ''Claude-Auth: abgelaufen'' (Text,
  nicht nur Farbe) analog zur GitHub-/CI-Statusanzeige, mit Erneuerungs-Anleitung
  (claude setup-token). Faengt den Ablauf, BEVOR jemand etwas startet. Probe-Logik
  mockbar, kein Token im Log. Unabhaengig von Story B baubar.'
