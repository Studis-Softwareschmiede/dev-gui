notes: 'Spec: docs/specs/feature-status-derivation.md — implements AC8 (V7).


  Erweitert die BEREITS ausgelieferte Ableitung (S-238 Done, src/BoardAggregator.js:
  computeFeatureStatus + FEATURE_STATUS_ORDER). Reine read-only Backend-Aenderung,
  KEIN Endpunkt, KEINE Schreibvorgaenge, KEINE Frontend-Aenderung (BoardView rendert
  feature.status via StatusBadge/isFeatureDone und profitiert automatisch).


  Regel (V7/AC8): ''Verworfen'' zaehlt terminal wie ''Done'' (hoechster Fortschrittsindex),
  wird NICHT wie Idee ausgeschlossen, aendert Blocked-Prioritaet (V2) nicht. Der abgeleitete
  Feature-Status ist NIE ''Verworfen'' — kollabiert die terminale Stufe, ist das Label
  ''Done''.


  Umsetzung: ''Verworfen'' im Ordnungs-Vertrag auf denselben Index wie ''Done''(3)
  abbilden (z.B. Verworfen -> Done normalisieren vor der Index-Berechnung, oder terminale
  Menge {Done, Verworfen}). Ergebnis-Label der terminalen Stufe bleibt ''Done''. V6-Fallback
  (unbekannter Status -> To Do) bleibt fuer ECHTE unbekannte Werte; Verworfen ist
  ab jetzt bekannt.


  Folgerungen (Tests): nur Verworfen -> Done; Done+Verworfen -> Done; To Do+Verworfen
  -> To Do; Idee+Verworfen -> Done (Idee raus); Blocked+Verworfen -> Blocked. Bestehende
  AC1-AC7-Tests bleiben gruen.


  Nicht-Ziele: Progress-Rollup ''X/Y done'' (unveraendert); persistiertes status-Feld;
  Frontend/Badge.'
