<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dev-gui</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1a1a1a;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      /* WCAG 2.4.7 — visible focus ring for argument input */
      #trigger-arg:focus-visible {
        outline: 2px solid #3b82f6;
        outline-offset: 1px;
      }
      /* ── Settings-Kategorien-Nav (settings-panel-navigation D4–D9/D18/D20, S-267) ── */
      .settings-layout { display: flex; flex-direction: column; gap: 16px; }
      .settings-nav { flex-shrink: 0; }
      .settings-tablist { display: flex; flex-direction: row; overflow-x: auto; gap: 2px; }
      .settings-nav-item {
        display: block; min-height: 44px; padding: 10px 16px;
        background: transparent; color: #9ca3af;
        border: none; border-left: 3px solid transparent; border-radius: 6px;
        font-size: 14px; text-align: left; cursor: pointer; white-space: nowrap;
      }
      .settings-nav-item:hover { background: #1e293b; }
      .settings-nav-item.active {
        background: #1e293b; color: #e5e7eb; font-weight: 700;
        border-left: 3px solid #3b82f6;
      }
      .settings-nav-item:focus-visible { outline: 2px solid #3b82f6; outline-offset: 1px; }
      .settings-panel { flex: 1; min-width: 0; }
      .settings-panel:focus-visible { outline: 2px solid #3b82f6; outline-offset: 1px; }
      @media (min-width: 1024px) {
        .settings-layout { flex-direction: row; gap: 24px; }
        .settings-nav { width: 220px; }
        .settings-tablist { flex-direction: column; overflow-x: visible; }
      }
      /* ── Bereichs-Untermenü (bereichs-untermenu, F-087/S-374) ──
         Strukturell 1:1 gespiegelt von der settings-*-Familie oben, aber
         bereichsunabhängig (eigener Klassen-Präfix) UND semantisch <nav>+
         aria-current statt role=tablist/aria-selected (Design §0). */
      .subnav-layout { display: flex; flex-direction: column; gap: 16px; }
      .subnav { flex-shrink: 0; }
      .subnav-list { display: flex; flex-direction: row; overflow-x: auto; gap: 2px; }
      .subnav-item {
        display: block; min-height: 44px; padding: 10px 16px;
        background: transparent; color: #9ca3af;
        border: none; border-left: 3px solid transparent; border-radius: 6px;
        font-size: 14px; text-align: left; cursor: pointer; white-space: nowrap;
      }
      .subnav-item:hover { background: #1e293b; }
      .subnav-item.active {
        background: #1e293b; color: #e5e7eb; font-weight: 700;
        border-left: 3px solid #3b82f6;
      }
      .subnav-item:focus-visible { outline: 2px solid #3b82f6; outline-offset: 1px; }
      .subnav-content { flex: 1; min-width: 0; max-width: 860px; }
      .subnav-content:focus-visible { outline: 2px solid #3b82f6; outline-offset: 1px; }
      @media (min-width: 1024px) {
        .subnav-layout { flex-direction: row; gap: 24px; }
        .subnav { width: 220px; }
        .subnav-list { flex-direction: column; overflow-x: visible; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
