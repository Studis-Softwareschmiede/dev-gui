id: F-015
title: 'Deploy-Pipeline-Integration: Image-Liste + dynamische VPS-Ziele'
goal: Die beim ersten echten Live-Test (2026-06) aufgedeckten Integrationslücken der
  End-to-End-Deploy-Pipeline (F-013) schließen — die Einzelbausteine funktionieren,
  aber die Naht zwischen "VPS anlegen" (S-152) und "App deployen/verwalten" (S-155/S-157)
  fehlt. (A) Das Image-Dropdown bleibt leer, weil der GitHub-Packages-Listen-Endpunkt
  mit dem App-Installation-Token "400 Invalid argument" liefert (Einzel-Endpunkte
  funktionieren) → Org-Container-Images unter App-Token zuverlässig auflistbar machen
  (App-Token-only bleibt, kein GH_TOKEN-Fallback). (B) Ein dynamisch via dev-gui angelegter
  VPS ist weder deploybar noch in der Container-Übersicht sichtbar, weil SSH-Ziele
  nur aus der statischen VPS_TARGETS-Env aufgelöst werden → beim Create die Ziel-Metadaten
  persistieren und alle drei Konsumenten (Deploy-Dropdown, Container-Übersicht, Reconcile)
  zusätzlich zur Env aus dieser dynamischen Quelle auflösen.
