owner_vorfall_2026_07_08: 'VERIFIZIERTE zweite Ursache (neben dem fehlenden Mount,
  S-329): src/obsidianVaultPath.js verlangt HART einen Unterordner mit dem Namen exakt
  „Projekte" (PROJEKTE_SUBDIR = ''Projekte'') direkt unter dem Vault und listet Projekte
  unter <vault>/Projekte. Der reale Vault des Owners hat aber KEINEN Ordner „Projekte"
  — die Fabrik-Projekte liegen unter „300 Projekte/Studis Softwareschmiede/<Projekt>"
  (mit Zahlen-Präfix + Zwischenebene). Selbst bei gemountetem Vault käme daher der
  Fehler missing-projekte. FIX: Den Projekt-Unterordner konfigurierbar machen — statt
  hart „Projekte" ein konfigurierbares Pfad-Segment (z. B. Env oder Setting, das auf
  „300 Projekte/Studis Softwareschmiede" o.ä. zeigen kann), Mehrebenen-Pfad erlauben.
  Containment-/Realpath-/Traversal-Schutz (AC3) und die Race-Sicherheit MÜSSEN erhalten
  bleiben. Tests: Vault mit „300 Projekte/…"-Struktur wird korrekt gelistet; Traversal-Schutz
  weiterhin dicht. Cross-Ref: obsidian_source im agent-flow-profile zeigt bereits
  auf „…/300 Projekte/Studis Softwareschmiede/Agent Flow" — die Konvention existiert
  dort schon, dev-gui muss sie nur konfigurierbar spiegeln. Erst S-329 + diese Story
  zusammen machen das Obsidian-Intake in dev-gui lauffähig.'
