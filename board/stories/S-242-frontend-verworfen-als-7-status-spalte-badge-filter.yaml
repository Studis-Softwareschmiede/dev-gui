notes: 'Spec: docs/specs/board-status-verworfen.md — implements AC1–AC5.


  Reine Anzeige-/Leseaenderung im Frontend (client/src/BoardView.jsx). KEIN Backend-Delta,
  KEIN Endpunkt, KEIN Schreibpfad. Das Board-Schema-Enum selbst gehoert agent-flow
  (parallele Story) — dev-gui spiegelt den Status-String nur.


  Kern: ''Verworfen'' als 7. Element ans zentrale STATUS_LIFECYCLE-Array anfuegen (nach
  ''Done''). Dieses eine Array speist Spalten (gridTemplateColumns: repeat(STATUS_LIFECYCLE.length,
  …) -> 7 Spalten, Verworfen rechts neben Done), die Spalten-Gruppierung (byStatus)
  und die Filter-Checkbox-Liste (statusOptions) — eine Aenderung, drei Wirkungen (AC1/AC3/AC4).


  STATUS_BADGE_STYLES um Schluessel ''Verworfen'' erweitern: gedaempft-neutraler (grauer)
  Ton, klar vom gruenen Done-Ton abgesetzt, Kontrast >= 4.5:1 (WCAG AA); Bedeutung
  via Text ''Verworfen'', nicht nur Farbe (AC2).


  AC3 (D1): Filter-Checkbox ''Verworfen'' ist beim Oeffnen vorausgewaehlt (Default
  alle an, konsistent mit studis-kanban-board-ux AC2); n/N-Zaehler bis 7; Alle/Keine-Toggle
  (AC7, bereits Done) bezieht Verworfen automatisch ein — KEINE Status-spezifische
  Sonderlogik.


  AC4: Verworfen-Story landet in ihrer eigenen Spalte, NICHT im To-Do-Fallback-Bucket
  fuer unbekannte Status; der Fallback bleibt fuer echte unbekannte Werte erhalten.


  AC5 (Regressions-Invariante, KEIN Code-Delta erwartet): Test belegt, dass dev-gui
  keinen Verworfen-Schreibpfad hat und ProjectDrain (src/ProjectDrain.js: nur To Do/In
  Progress lebendig) + Ready-Berechnung (src/BoardAggregator.js: status===''To Do'')
  Verworfen-Stories nicht aufgreifen.


  Tests: BoardView — 7 Spalten inkl. Verworfen rechts von Done; Badge-Ton != Done;
  Filter-Checkbox default an + Deselektion blendet aus; Verworfen-Story in eigener
  Spalte (nicht To-Do-Fallback). Regressionstest fuer AC5.


  Nicht-Ziele: Schema/Enum-Definition (agent-flow); Feature-Status-Ableitung (S-243);
  Archiv-Kriterium (S-244); Rollup-Aenderung; Verworfen-Schreibpfad aus der GUI.'
