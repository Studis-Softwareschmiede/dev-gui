id: F-014
title: 'VPS-Create-Formular: Live-Dropdowns für Typ/Region/Image mit Kosten'
goal: 'Im VPS-Create-Formular ("Neuen Server erstellen") die fehleranfälligen Freitextfelder
  Server-Typ, Region und Image durch Dropdowns mit live von der Hetzner-API geladenen
  Werten ersetzen; beim Server-Typ die Kosten (monatlich + stündlich, regionsbezogen)
  anzeigen. Nur Hetzner — andere Provider behalten Freitext (graceful Fallback), Architektur
  aber für späteres Nachziehen vorbereitet. Zusätzlich: Tunnel-Rollback, wenn der
  VPS-Create nach bereits angelegtem Cloudflare-Tunnel scheitert (kein verwaister
  Tunnel mehr).'
