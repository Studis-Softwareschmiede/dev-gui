  Inhalt: neue read-only-Operation VpsDockerControl.probe(vps, opts?) in src/deploy/VpsDockerControl.js
  -> {state: "unreachable"|"provisioning"|"ready", reason?}. EINE SSH-Session (kanonischer Befehl:
  test -f /var/lib/cloud/instance/boot-finished && docker info >/dev/null 2>&1 && docker ps
  --filter name=cloudflared --filter status=running -q | grep -q . && echo READY || echo NOTREADY).
  stdout READY->ready, NOTREADY->provisioning, SSH/Connect/Auth/Timeout->unreachable (AC2/AC3);
  docker-info-Fehler erzeugt KEIN DOCKER_FAILED (nach /dev/null verworfen). Wiederverwendung der
  bestehenden runSshCommand/classifyError + CONNECT_TIMEOUT_MS/EXEC_TIMEOUT_MS (keine zweite
  Timeout-Quelle); Private-Key store-intern aus CredentialStore wie inspect/pull/ps (AC13: nie
  in Argv/Log/Audit/Response/WS). Deploy-Gate (AC4/AC5/AC6): DeployOrchestrator.deploy()
  (src/deploy/DeployOrchestrator.js, vor dem pull ~Zeile 149) ruft probe() auf; state != ready ->
  kein pull/run, kein Cloudflare-Schritt, Rueckgabe {result:"error", errorClass:"vps-provisioning",
  reason:freundlich}; state == ready -> bestehende Saga unveraendert (AC3-AC9 deploy-lifecycle).
  Floor: kein neuer Store; probe wirft nie (jeder Fehler -> einer der drei Zustaende). Tests:
  probe-Klassifikation (READY/NOTREADY/connect-fail/auth-fail/timeout, unerwartetes stdout->provisioning);
  Orchestrator mit probe->provisioning/unreachable ruft pull NIE auf; probe->ready -> Saga laeuft;
  kein Key/Token im Argv/Response/Audit. L (~5 EP) — Boundary-Operation + Orchestrator-Gate + Tests.'
