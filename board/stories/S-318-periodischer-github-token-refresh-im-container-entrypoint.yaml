notes: 'Owner-Anforderung FINAL freigegeben 2026-07-07 (Vorfall Headless-GitHub-Token-Refresh).
  Spec docs/specs/headless-gh-token-refresh.md (AC1–AC7). Kern: docker-entrypoint.sh startet
  NACH dem gh-Auth-Bootstrap und VOR `exec node server.js` eine Hintergrund-Refresh-Schleife
  (Intervall via Env-Var, Default ~45 min, strikt < ~60-min-Token-Gültigkeit), die je Durchlauf
  ensure-gh-auth.sh (Auflösung über den bestehenden Plugin-Cache-Pfad-Mechanismus, kein
  hartkodierter Pfad) erneut aufruft und damit AUSSCHLIESSLICH die bestehenden Ist-Ablagen
  aktualisiert ($HOME/.config/gh via `gh auth login --with-token`, git-Credential-Ablage via
  `gh auth setup-git`) — keine neuen session-lesbaren Ablagen erfinden. gh liest die Config pro
  Aufruf neu -> laufende claude -p-Sessions profitieren ohne Neustart (AC2/AC3). SECURITY (AC4/AC5):
  GPG_PASSPHRASE erscheint weder in der Child-Env (buildChildEnv/BASE_ALLOWED_ENV_KEYS in
  src/HeadlessRunnerCore.js bleibt UNVERÄNDERT, kein GPG_PASSPHRASE/GH_TOKEN) noch an einem
  session-lesbaren Pfad (keine gpg.pass-Datei); das Master-Secret bleibt im Entrypoint-Prozess,
  Sessions sehen nur kurzlebige Tokens (kleinerer Blast-Radius, Sessions laufen mit
  --dangerously-skip-permissions). ROBUSTHEIT (AC6): Refresh-Fehler (Netz weg/GPG/Skript fehlt)
  loggt einen klaren, secret-freien Hinweis und läuft weiter — kein Container-Crash, node server.js
  ungestört, nächstes Intervall erneut. Die bestehende 401-Erkennung (isAuthError/AUTH_ERROR_PATTERN,
  HeadlessRunnerCore) bleibt UNVERÄNDERT als Fangnetz (AC7). BEWUSST VERWORFEN (Security, in Spec
  Nicht-Ziele): GPG_PASSPHRASE in Child-Env-Allowlist ODER gpg.pass an session-lesbare Pfade
  mounten. Kein Secret in Log/Prozessliste/Datei. Tests: Bash-Ebene (Schleifen-/Intervall-/
  Fehlerpfad) + buildChildEnv-Assertion (kein GPG_PASSPHRASE/GH_TOKEN durchgereicht).'
