notes: 'Idee aufgreifen via INTERAKTIVE Besprechung -- ERSETZT die alte Ein-Klick-

  Automatik (kein headless one-shot auf den rohen Text mehr). Klick auf eine

  Idee-Karte oeffnet ein Dialogfenster, das eine interaktive Gespraechs-Session

  startet: dialogisches Hin-und-Her zwischen Owner und Claude -- DIESELBE

  interaktive PTY-Engine wie das "Arbeiten"-Terminal (CommandService +

  PtySessionRegistry), reiner PTY-Pfad, KEIN claude -p (CLAUDE.md).


  AC5 (discuss-Start): API POST /api/board/projects/:slug/ideas/:id/discuss ->

  200 {sessionId}. Stellt die interaktive PTY-Session des Projekts sicher/nutzt

  sie, wechselt ins Terminal-Pane und laedt die Stichworte der Idee (Titel +

  Body) als KONVERSATIONELLEN Gespraechs-Einstieg vor -- freier Gespraechstext

  in die Session (gleicher Pfad wie Terminal-Tippen), NICHT ueber die Slash-

  Allowlist, NICHT als one-shot; sanitisiert (keine Steuerzeichen / keine zweite

  Submit-Zeile). Idee bleibt UNVERAENDERT im Status Idee. Bei laufendem Command

  (Session busy) -> 409, Idee unveraendert.


  AC6 (requirement als Abschluss + Lifecycle): im Dialog schaerfen Owner+Claude

  die Anforderung gemeinsam; der requirement-Flow laeuft als FORMALISIERUNG des

  Besprochenen -- Owner stoesst /agent-flow:requirement (optional mit geschaerfter

  Zusammenfassung) ueber den BESTEHENDEN POST /api/command an (BEREITS in der

  Allowlist, KEINE neue Regel); der Agent hat den Gespraechs-Kontext der Session.

  Ergebnis: mind. eine umsetzbare (spaeter ready-faehige) To-Do-Story + Spec,

  vollstaendig beim Agenten. Idee bleibt Idee, solange das Gespraech laeuft -- KEIN

  vorzeitiges Done beim Oeffnen, KEINE Dublette. Aufloesen ist EXPLIZITE Owner-

  Aktion: POST /api/board/projects/:slug/ideas/:id/resolve {resolved_story_ids?,

  resolved_note?} -> BoardWriter setzt Idee-Item auf Done + resolved_at +

  Verlinkung der erzeugten Story/Spec. KEIN Agent-Dispatch; KEINE automatische

  Ableitung aus Agenten-Output (dev-gui beobachtet/parst den Lauf nicht).


  Edge: Gespraech abgebrochen (Terminal geschlossen, keine Stories) -> Idee bleibt

  Idee (re-besprechbar, keine verwaiste Done-Karte). Doppel-Resolve via

  resolved_at-Guard -> 400. Audit (AC7) je discuss-Start + je resolve.

  Wiederverwenden: interaktive PTY-Session/CommandService (flow-trigger),

  PtySessionRegistry, BoardWriter (S-191/S-199-Create-Pfad, hier um Resolve-Pfad

  erweitert), Terminal-Pane (F-011/[[fabric-intake-dialog]]), AuditStore.

  Setzt S-199 (Idee-Items vorhanden) voraus.

  '
