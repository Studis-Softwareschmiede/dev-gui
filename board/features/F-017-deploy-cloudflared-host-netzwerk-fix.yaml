id: F-017
title: 'Deploy-Erreichbarkeit: cloudflared im cloud-init braucht --network host'
goal: 'Live beim Deploy gefunden: deployte Apps sind ueber Cloudflare nicht erreichbar,
  weil cloudflared im cloud-init im Default-Bridge-Netz laeuft. Aus Container-Sicht ist
  localhost dann der Container selbst, nicht der Host, auf dem die App-Container ihre
  Host-Ports mappen — die Tunnel-Route http://localhost:<hostPort> (DeployOrchestrator)
  laeuft ins Leere. Fix: cloudflared-docker-run im cloud-init mit --network host starten,
  konsistent zur Route-Konvention. TEMPLATE_VERSION 4->5. Token-Floor unveraendert.'
