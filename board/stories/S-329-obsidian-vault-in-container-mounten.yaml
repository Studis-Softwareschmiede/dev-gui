owner_vorfall_2026_07_08: 'Settings → Integrationen → Obsidian zeigt „Pfad existiert
  nicht" und „Projekt in die Fabrik holen → Aus Obsidian-Notizen" zeigt „Projekt-Ordner
  konnten nicht geladen werden". VERIFIZIERTE Ursache: Der Obsidian-Vault existiert
  auf dem Mac-Host (/Users/alex/Library/Mobile Documents/iCloud~md~obsidian/Documents/AlexSecondBrain),
  ist aber NICHT in den Linux-Container gemountet — docker-compose hat nur /workspace
  + die zwei Named Volumes + docker.sock. Der ins Feld eingegebene HOST-Pfad existiert
  im Container nicht. Intendierte Mechanik (aus src/obsidianVaultPath.js): Env OBSIDIAN_VAULT_DIR
  als Containment-Wurzel (analog WORKSPACE_DIR) + der konfigurierte Pfad = CONTAINER-interner
  Pfad. FIX: (1) Vault als Bind-Mount in docker-compose.override.yml (lokal Mac; Docker-Filesharing
  erlaubt /Users bereits) — read-write, da der Idea-Roundtrip/obsidian-ingest Frontmatter-Sync-Felder
  zurückschreibt. (2) OBSIDIAN_VAULT_DIR=<mount-pfad> setzen. (3) VPS-Pendant dokumentieren
  (dort liegt der Vault anders). (4) Doku im .env.example + Runbook, dass der Settings-Pfad
  der CONTAINER-Pfad ist, nicht der Mac-Pfad. Hängt fachlich mit S-330 zusammen (Projekt-Unterordner-Konvention)
  — erst beide zusammen machen das Obsidian-Intake in dev-gui lauffähig.'
