estimate_note: 'Backend: neue Route DELETE /api/vps/machines/:provider/*splat in src/vpsRouter.js
  — gleiches *splat-Routing + serverId-Validierung wie start/stop, Audit-First (vps:delete)
  + checkMutationAuthz (CRED_ADMIN_EMAILS) wie die uebrigen Mutationen. VpsProviderRegistry.delete
  + Provider-Adapter deleteServer(serverId, token) (hetzner/ionos/hostinger — pruefen/wiring;
  Hostinger ggf. unsupported wie create) + capabilities() um delete erweitern ({list,start,stop,create,delete}).
  Tunnel-Cleanup: VPS->Tunnel-Zuordnung (aus S-152) aufloesen, Routen/DNS entfernen
  + CloudflareApi.deleteTunnel(tunnelId) + Token-Referenz credentials/cloudflare/tunnel_token/<tunnelId>
  aus dem Store loeschen; idempotent (404=gone kein Fehler) + best-effort (Cloudflare-Cleanup-Fehler
  maskiert nicht den Server-Lösch-Status, klar gemeldet/auditiert); keine Zuordnung
  -> Cleanup uebersprungen (AC5). Frontend client/src/VpsView.jsx: Loeschen-Button
  in der VPS-Zeile neben Start/Stop (disabled bei capabilities.delete=false), type-to-confirm-Dialog
  (VPS-Name exakt eintippen, sonst Button gesperrt, kein DELETE), Lade-/Erfolg-/Fehler-/403-Zustaende,
  kein Token im Frontend. Breiter Vertikalschnitt Router+Registry+3 Adapter+CloudflareApi-reuse+UI+type-to-confirm
  (~L, ~8 EP). Test: DELETE loescht Server + raeumt Tunnel/Token idempotent; unsupported-Provider
  422; Authz 403; Audit-First; UI type-to-confirm blockiert Mismatch; Loeschen-Button
  respektiert capability.'
