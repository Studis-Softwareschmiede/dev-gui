estimate_note: 'DR-Test-Befund (verifiziert): beim Restore kommen die geheimen Remote-Creds aus dem Blob zurück, aber die nicht-geheime Backup-Ziel-Config (off-host enabled, S3-Endpoint/Bucket/Präfix/Region, Retention) geht verloren — sie lag nur als backup-config.json im zerstörten Volume. Lösung: BackupEngine.runBackup erweitert das Artefakt {manifest,blob} um ein nicht-geheimes config-Feld (aus BackupConfigStore.read(), KEINE Remote-Creds/Master-Key — Floor); CredentialStore.restore() bzw. backupRestore.js schreibt config beim Restore atomar über BackupConfigStore zurück (best-effort, kein Store-Rollback bei Config-Fehler). Rückwärtskompatibel: Alt-Artefakte ohne config restoren wie bisher. Lokalisiert auf BackupEngine + Restore-Pfad; Tests: Artefakt-config vorhanden+geheimnisfrei, Restore stellt config wieder her, Config-Fehler rollt Store nicht zurück, config-loses Alt-Artefakt restored sauber. ~M (~4 EP).'
