estimate_note: 'Heuristik M (score=4: 2 AC + 2 Komponenten [src/deploy/DeployOrchestrator.js,
  Tests], kein db/security/ui-Label-Bump). Kein estimator-Dispatch (M, token-frei);
  dispo_est aus baseline.json js|balanced|M ep=5.0 (n=8) → confidence medium. tok_est
  null (baseline tok_total null — keine Baseline-Tokens, Cold-Start). Kern: in DeployOrchestrator.deploy()
  den Block (g) (Ersetzungsschritt, ~Z.259-281: psAll → #rollbackContainer je Match)
  und den Pull-Schritt (~Z.283-291) TAUSCHEN, sodass die Aufruf-Reihenfolge lautet:
  Gates (a)-(f) unverändert → pull → psAll+rm → inspect (AC13) → selectFreeHostPort
  → run → Route. HARTE Punkte: (1) pull schiebt sich zwischen Gate und rm, NIE vor
  die Gates — die v2-Zusage "kein Schritt vor dem Gate" (AC1/AC3/AC5/AC6) bleibt wörtlich
  gültig, die Kommentare an (g) sind entsprechend nachzuziehen (sie behaupten heute
  die alte Platzierung). (2) pull-Fehler → bestehender early-return {result:"error",
  reason: sanitizeReason(...), errorClass} UNVERÄNDERT, aber jetzt VOR jedem rm/run
  → bestehender Container läuft weiter, Route/DNS unberührt. (3) Der Ersetzungsschritt
  muss VOR #selectFreeHostPort bleiben (AC19), sonst gilt der Port des Altcontainers
  noch als belegt und jeder Re-Deploy wandert auf einen höheren Host-Port — das ist
  die Hauptfalle beim Umsortieren. (4) inspect(image) braucht das Image lokal, muss
  also nach pull bleiben; replacingExisting/replaced:true-Semantik (AC14) unverändert;
  best-effort-Charakter des rm (Fehler blockiert Deploy nicht) unverändert; kein Rollback
  des Ersetzungsschritts (bewusst, siehe Nicht-Ziele). Tests (Pflicht): Regressionstest
  zum Ausfall-Defekt — Deploy auf bestehenden Hostname mit pull-Fehler-Mock → rm/run
  NIE aufgerufen (v1/v2: rm lief vor dem fehlschlagenden pull); Reihenfolge-Test im
  Erfolgsfall (pull → rm → run, z.B. via Call-Order-Assertion); Port-Wiederverwendung
  8080 → Re-Deploy → 8080. Bestandstests zu AC4/AC13/AC14/AC17 müssen unverändert
  grün bleiben. Der Update-Endpunkt (container-image-update, POST .../containers/:containerId/update,
  F-080/S-355) konsumiert dieselbe Saga und profitiert automatisch — dort ist KEIN
  eigener pull/rm-Code zu ergänzen.

