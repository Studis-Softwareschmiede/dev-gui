notes: |
  ProjectJobLock (Schluessel = absoluter Projektpfad) ersetzt fuer Drains den globalen
  JobLock (src/JobLock.js, max 1 process-weit reicht fuer maxParallel>1 nicht). Busy je
  Projekt = Lock-gehalten ODER aktive Session/aktiver Command (auch manuell im UI
  gestartet, via CommandService/PtySessionRegistry) -> kein Doppel-Trigger.
  Lock wird bei Drain-Ende/Fehler IMMER freigegeben (kein Dauer-Lock, analog
  CommandService-Lock-Freigabe). Fundament fuer S-192 (ProjectDrain).
  Wiederverwenden: JobLock-Muster, CommandService.getStatus(), PtySessionRegistry.
