estimate_note: 'Root Cause: BitwardenDeployLoginService.#openSession legte pro Aufruf
  ein frisches temp-BITWARDENCLI_APPDATA_DIR an + `bw login --apikey` + `bw logout` ->
  leeres Verzeichnis => jeder Login = neues Gerät => Mailflut. Fix (Variante 2):
  persistentes Verzeichnis (DEVGUI_BW_DEPLOY_APPDATA_DIR, chmod 700), `bw login --check`
  vor Login (Folge-Sessions nur `bw unlock`), `bw lock` statt `logout` (Vault
  verschlüsselt at-rest, Gerät bleibt), Instanz-Mutex serialisiert den geteilten State.
  Code+Tests im Branch, 100 Suites-Tests grün, Lint sauber. Live-Beweis = Mailflut endet
  nach Deploy (genau EIN Erst-Login pro Container).'
