notes: 'Verifizierter Architektur-Bug (2026-07-08, zwei fehlgeschlagene E2E-Läufe
  der Redaktionsschleife): Der RegressionDefineRunner (src/RegressionDefineRunner.js)
  parst bisher die stdout-Finalausgabe des `claude -p /agent-flow:regression-define`-Laufs
  (parseRegressionDefineOutcome: fence/objectMatch). Die ÄUSSERE claude-Session dispatcht
  den regression-define-Agenten als Sub-Agent; der Sub-Agent liefert sauberes JSON,
  aber die orchestrierende Session schreibt als Finalausgabe eine Prosa-Zusammenfassung
  (teils mit Rückfrage, kein "{" mehr) -> Parse findet kein JSON -> error_class parse-error.
  Zwei agent-flow-seitige Instruktions-Fixes blieben wirkungslos.


  Owner-Entscheidung (mit agent-flow abgestimmt, ergebnis_datei-Vertrag): Der Runner
  übergibt dem Aufruf ein Argument ergebnis_datei=<absoluter-pfad> (Konvention <repo>/board/runs/regression-define/<jobId>.json,
  gitignored via board/runs/). Der agent-flow-Skill schreibt das Rückgabeformat-JSON
  atomar (tmp+rename) genau dorthin; der Runner erzeugt das Verzeichnis, wartet auf
  Prozess-Ende und LIEST DAS ERGEBNIS AUS DER DATEI statt aus stdout (parseRegressionDefineOutcome-Logik
  bleibt, nur die QUELLE wechselt). Die stdout-Prosa bleibt nur noch als geheimnisfreie
  raw_output-Diagnose (bestehende AC12/AC13) erhalten, ist NICHT mehr die Ergebnisquelle.


  Scope (implements AC14-AC17 der Spec regression-define-dialog.md v3): AC14 ergebnis_datei=-Übergabe
  + Verzeichnis-Erzeugung, identisch für beide Läufe (vorschlag + uebersetzen/Resume);
  AC15 Ergebnisquelle = Dateiinhalt statt stdout; AC16 differenzierte Fehlerklassen
  (Datei fehlt vs. Datei kein gültiges JSON, beide error_class parse-error, unterschiedliche
  Kurzdiagnose), gilt für beide Modi; AC17 Aufräumen der Ergebnisdatei nach Konsum
  (best-effort), board/runs/regression-define/ bereits gitignored (verifiziert, kein
  neuer Ignore-Eintrag nötig).


  Cross-Repo-Hinweis (KEINE harte Board-Blockade): die eigentliche Schreib-Mechanik
  (agent-flow-Skill schreibt JSON in ergebnis_datei) ist ein PARALLELER agent-flow-Fix
  (Spec regression-define). Die dev-gui-Seite ist GEGEN STUB TESTBAR (Testdatei anlegen
  / leer lassen / kaputt-JSON), daher bewusst NICHT über blocked_reason gebremst.


  NICHT anfassen: board/runs/ (Laufzeit).'
befund_2026_07_08_v2: 'Zweiter Umsetzungsversuch verfehlt (Commit 5ddf82f revertiert
  640511a, main wieder gruen). Reviewer + Tester hatten lokal 7292/7292 gruen (inkl.
  voller npm test + npm run lint) und die Race explizit als per-await-Reihenfolge
  verifiziert (readFile/unlink vor Statuswechsel) -- auf der echten GitHub-Actions-CI
  schlugen dieselben 4 Assertions in test/RegressionDefineRunner.test.js dennoch fehl:
  job.status blieb auf "running" statt auf done/needs-review/timeout zu wechseln (Zeilen
  318, 487, 580, 692). Zusaetzlich 1 Fehlschlag in test/headless-night-drain.integration.test.js
  (vermutlich unabhaengiges Timing-Flake, nicht verifiziert). Diagnose-Hinweis fuer
  den naechsten Versuch: die Race reproduziert NUR unter CI-Last/Parallelitaet (jest
  --maxWorkers unterscheidet sich vermutlich lokal vs. Runner), lokale grüne Läufe
  sind daher NICHT ausreichend als Beleg -- der coder sollte die Testumgebung CI-aehnlich
  stressen (z.B. mit reduzierter maxWorkers-Zahl oder mehrfachen Wiederholungen/--runInBand
  vs parallel) statt sich auf einen einzelnen lokalen Lauf zu verlassen, und die tatsaechliche
  Ursache der Restrace im Runner-internen Event-Loop (Promise-Verkettung in #runRound)
  tiefer pruefen statt nur den zuvor benannten Await-Punkt zu fixen.'
befund_2026_07_08: 'DREI Versuche rot (Host-Merge + 2 Drain-Merges, alle via Auto-Revert
  zurück, main blieb grün). WURZEL PRÄZISE DIAGNOSTIZIERT: Der PRODUKTIONSCODE ist
  korrekt (readFile/unlink sauber awaited vor #finish). Der Fehler ist TEST-SEITIG:
  die Runner-Tests machen ECHTE Dateisystem-I/O (mkdir/readFile über node:fs/promises).
  Der neue Datei-Pfad fügt echte I/O-Wartepunkte hinzu; die Tests warten nur mit Promise-Flush/Ticks,
  der NICHT mehr ausreicht → Job noch auf status:running wenn die Assertion prüft.
  Container (schnelle I/O) grün, CI (langsamer/anders) rot: Expected needs-review/failed,
  Received running (test/RegressionDefineRunner.test.js Zeilen ~296/344/383/406/423).
  PFLICHT-FIX (nicht optional): fs-Funktionen INJIZIERBAR machen wie spawnFn/nowFn/runClaude
  — Konstruktor-Params mkdirFn/readFileFn/unlinkFn (Default node:fs/promises), im
  #runRound verwenden. Die Tests injizieren SYNCHRONE Fakes (In-Memory-Map statt echter
  Dateien) — KEINE echte fs-I/O in RegressionDefineRunner-Tests. Damit ist der Datei-Lauf
  deterministisch, kein Timing-Race. ZUSÄTZLICH: unused var _fileContent in Test-Helfern
  entfernen (Destructuring anders lösen). tester MUSS volle npm test + npm run lint
  fahren, nicht nur die 2 Runner-Testdateien.'
