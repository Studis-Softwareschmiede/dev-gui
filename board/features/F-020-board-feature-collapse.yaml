id: F-020
title: 'Board: Features ein-/ausklappen (Stories verstecken, Alle-Toggle, Zustand merken)'
goal: 'Im Board liegen alle Features offen mit ihren Story-Spalten untereinander —
  bei vielen Features/Stories muss man weit scrollen. Diese Feature macht jedes Feature
  ein-/ausklappbar (eingeklappt verschwinden die Stories, nur der Kopf bleibt), ergänzt
  einen "Alle ein-/ausklappen"-Schalter und merkt den Auf-/Zu-Zustand pro Projekt im
  Browser (localStorage). Default "Gemischt": erledigte Features eingeklappt, aktive offen.
  Reine Frontend-/Anzeige-Verbesserung — kein Backend, kein neuer Endpunkt. Das bisherige
  Ziel/DoD-Detail-Panel wird vom Einklappen entkoppelt (eigener Schalter).'
