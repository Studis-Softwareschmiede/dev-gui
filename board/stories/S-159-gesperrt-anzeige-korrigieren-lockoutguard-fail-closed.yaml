estimate_note: 'Bug: in der Cloudflare-Ansicht werden aktuell ALLE Hostnames als „gesperrt/protected" angezeigt, obwohl in Cloudflare gültig. Vermutete Ursache (coder MUSS echte Ursache verifizieren — Reproduktion: gültige Hostnames erscheinen alle gesperrt): src/cloudflare/LockoutGuard.js ist fail-closed, wenn DEVGUI_HOSTNAME nicht gesetzt ist → isProtected() gibt für JEDES Ziel true zurück (Zeile ~96-103). Anforderung: DEVGUI_HOSTNAME sauber konfigurierbar machen (docker-compose.yml + .env.example bereits vorhanden — Doku/Wirksamkeit prüfen) UND/ODER die Protected-Logik so anpassen, dass bei fehlender devgui-Hostname-Konfiguration NUR Access-Mauer-Hostnames (cloudflareaccess.com, ADR-011) als geschützt gelten, statt pauschal alles. Self-Lockout-Floor bleibt hart: eigener Hostname + Access-Mauer immer geschützt (nicht schwächen). Lokalisiert auf LockoutGuard (+ ggf. Config-Doku/Wiring) → ~M (~4 EP). Test: isProtected("app.example.com") = false bei gesetztem abweichendem DEVGUI_HOSTNAME; bei NICHT gesetztem DEVGUI_HOSTNAME ebenfalls false für normale Hostnames, aber true für <devgui-hostname> + <access-wall>.cloudflareaccess.com.'
