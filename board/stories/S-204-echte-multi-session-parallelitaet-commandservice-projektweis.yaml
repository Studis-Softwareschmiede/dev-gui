notes: 'NEU GESCHNITTEN (2026-07-01, requirement). Ziel des Gesamt-Epics: echte Parallelitaet
  im Nacht-Drain via headless "claude -p" (mehrere gleichzeitig), interaktiver PTV-Pfad
  100% unangetastet. Spec: docs/specs/headless-parallel-drain.md.


  DIESE Story (Anker, 1 von 3) = GENERISCHER RUNNER: HeadlessReconcileRunner (src/HeadlessReconcileRunner.js,
  heute hart auf /agent-flow:reconcile verdrahtet Z.212) generalisieren -> HeadlessFlowRunner
  bzw. gemeinsame Basis, sodass ein KONFIGURIERBARER Befehl gefahren wird (Default
  /agent-flow:flow, optional --cost-Args). Reconcile-Verhalten 1:1 uebernehmen: buildChildEnv
  Env-Allowlist + CLAUDE_CODE_OAUTH_TOKEN (Z.77-91), ANTHROPIC_API_KEY-Block, isAuthError
  401-Vorrang (Z.102-105), close-Event als einzige Fertig-Quelle (Z.235-249), SIGTERM-Timeout,
  ProjectJobLock finally-Freigabe (Z.157-159,260-262), In-Memory Job-Registry getJob.
  EIGENER, viel groesserer + konfigurierbarer Timeout FLOW_HEADLESS_TIMEOUT_MS (nicht
  der 15-min-Reconcile-Wert -> ein /flow-Lauf ueber ein Board dauert lange). KEIN Regress
  am Reconcile-Pfad (alle ACs von headless-reconcile-runner.md bleiben gruen).


  Gate: Unit-/Integrationstests mit gemocktem spawn (injizierbare spawnFn wie im ReconcileRunner).
  KEIN echter claude -p Live-Lauf (Restrisiko in der Spec vermerkt).


  Folge-Stories: S-212 (FlowRunner-Interface + ProjectDrain-Injection), S-213 (Scheduler-Headless-Integration
  + Auth-Vorabpruefung + Audit + CLAUDE.md). Alter Ansatz (interaktiven CommandService/JobLock
  projektweise entkoppeln) bleibt OBSOLET/verworfen.'
