id: F-036
title: Headless-Reconcile-Runner — echter claude -p-Job statt geratenes PTY-Ende
goal: 'Der Reconcile-Button lief nie zuverlaessig: der interaktive PTY-Pfad raet das
  Fertig-Signal (Idle-Timer), verwirft ohne Terminal-Zuschauer die Session (PtySessionRegistry)
  und der Befehl verpufft. Loesung: ein NEUER, vom PTY-Pfad getrennter Job-Runner
  startet /agent-flow:reconcile als echten ''claude -p --dangerously-skip-permissions''-Kindprozess
  im aufgeloesten /workspace/<slug> (CLAUDE_CODE_OAUTH_TOKEN in Spawn-Env, ANTHROPIC_API_KEY
  blockiert). Prozess-Exit = ''fertig'' (deterministisch); stdout/stderr erfasst;
  Runaway-Timeout; Sperre pro Projekt; 401-Erkennung (Stufe 1) -> Zustand auth-expired
  mit Erneuerungs-Hinweis (claude setup-token). Zwei Endpunkte (POST startet Job/jobId,
  GET liefert running|done|failed|auth-expired). Frontend: ReconcileTrigger von /api/session-PTY-Poll
  auf den neuen Headless-Endpunkt umgehaengt (bewusste Abloesung der S-205-Poll-Quelle).
  Interaktiver PTY-Pfad (Flow-/Board-Button) bleibt unangetastet.'
