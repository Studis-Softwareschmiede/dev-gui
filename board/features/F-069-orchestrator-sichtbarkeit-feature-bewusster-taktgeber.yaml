title: Orchestrator-Sichtbarkeit & feature-bewusster Taktgeber
goal: 'Zwei zusammengehörige Fähigkeiten rund um den neuen agent-flow-Feature-Drain
  (board-feature-drain.sh, schreibt Run-State nach board/runs/F-###/). (A) Run-State-Live-Anzeige:
  die Fabrik-/Board-Ansicht zeigt pro Projekt LIVE (SSE, ohne manuellen Refresh) welche
  Features gerade abgearbeitet werden — aktuelle Story, Fortschritt (z.B. 4/7), Phase
  (dossier/story/merge/rollout), letzter Fehler; Quelle ist board/runs/F-###/state.yaml
  (read-only). (B) Feature-bewusster ProjectDrain/Nachtwächter: hat die nächste bereite
  To-Do-Story ein Parent-Feature mit mehreren bereiten Storys, wird board-feature-drain.sh
  F-### gestartet statt einzelner /flow-Läufe; Einzelgänger laufen wie bisher über /flow.
  Bestehende Leitplanken (JobLock max 1, TokenLimitWatcher, BudgetGuard, Eskalation nach
  3x kein Fortschritt) gelten unverändert. Bewusst verworfen: lebende LLM-Orchestratoren,
  parallele Features, Feature-PRs. CROSS-REPO: umsetzbar erst wenn agent-flow
  feature-batch-orchestration v2 (Run-State-Schreiben) gelandet ist. Owner-Konzept FINAL
  freigegeben 2026-07-07.'
