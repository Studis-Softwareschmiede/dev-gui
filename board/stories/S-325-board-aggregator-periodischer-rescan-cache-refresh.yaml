befund_2026_07_08: 'Verifizierter Vorfall: Board-Änderungen, die NICHT vom Drain selbst
  geschrieben werden (Host-git-pull/-merge, manuelle Edits), erreichen den in-memory-Cache
  des BoardAggregator nicht — er serviert bis zum Container-Neustart den alten Stand.
  Ursache: native fs.watch empfängt im macOS-Docker-Bind-Mount keine inotify-Events
  für Host-seitige Datei-Änderungen (vom Container aus geschriebene Änderungen feuern
  dagegen und refreshen live). Konkret kostete das eine Runde: S-061 wurde per Host-Merge
  entsperrt (blocked_reason auf Platte null), der Aggregator zeigte S-061 aber weiter
  ready:false/blocked → Drain sah kein Ziel. Owner-Entscheidung: periodischer Rescan.
  FIX: Der BoardAggregator liest die Board-Dateien zusätzlich in festem Intervall
  (Default ~30–60 s, via Env konfigurierbar) neu ein — unabhängig von fs-Events, additiv
  zum bestehenden event-getriebenen Refresh/SSE (der bleibt für die schnelle Live-Reaktion).
  Fängt jedes verpasste Event auf jeder Plattform ab. ACs u.a.: (1) eine Board-Datei-Änderung
  ohne fs-Event wird spätestens nach einem Intervall im Aggregator/an der API sichtbar;
  (2) event-getriebener Pfad + SSE bleiben unverändert (Rescan ist Sicherheitsnetz,
  kein Ersatz); (3) Intervall via Env konfigurierbar, sinnvoller Default; (4) kein
  Rescan-Sturm/Overlap (ein Rescan zur Zeit, überspringt wenn noch läuft).'
