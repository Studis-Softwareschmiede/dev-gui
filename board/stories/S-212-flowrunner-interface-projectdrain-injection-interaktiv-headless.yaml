notes: 'Story 2 von 3 des headless-parallel-drain-Epics (Spec: docs/specs/headless-parallel-drain.md).


  FlowRunner-Interface einfuehren (2 Operationen: Lauf starten {projectPath,command}
  + auf ECHTES Ende warten -> terminaler Status). Zwei Adapter: (a) INTERAKTIV ueber
  CommandService.tryRun() + Idle-Completion-Poll (heutiges Verhalten bit-identisch),
  (b) HEADLESS ueber HeadlessFlowRunner (S-204), Ende = close-Event statt PTY-Idle-Poll.


  ProjectDrain (src/ProjectDrain.js) bekommt den FlowRunner INJIZIERT: der Ausfuehrungs-Schritt
  in #runLoop (Z.558 commandService.tryRun + Z.580 #awaitCompletion) geht ueber das
  Interface statt hart ueber CommandService. GESAMTE uebrige Drain-Logik unveraendert
  (Drain-Ziele/ready, zustandsbasierte Abbruch-/Konvergenz-Regel, Eskalation-auf-Blocked,
  Snapshot-Diff, Sicherheitsguertel). Ohne Injection (Default) = interaktiver Adapter
  -> manueller "Board abarbeiten"-Knopf (S-196) + Terminal + bestehende Tests bit-identisch
  (AC6, Regressions-Guard).


  Gate: Unit-/Integrationstests mit gemocktem Runner/spawn (AC13). Depends: S-204 (HeadlessFlowRunner).'
