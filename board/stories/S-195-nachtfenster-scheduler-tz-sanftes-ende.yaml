notes: 'NightWatchScheduler (Muster ReconciliationJob: einzelne setTimeout-Kette,

  Skip-if-running, unref(), pro Projekt degradierend). Draint im Nachtfenster ALLE

  Projekte (oder projects-Liste) ueber die ProjectDrain-Engine (S-192), bis maxParallel

  (Default 3, geklemmt 1-3) parallel; Polling intervalMinutes (Default 15). Fenster

  window.start/end in window.timezone (Europe/Zurich); UEBER MITTERNACHT (start>end):

  im Fenster wenn Zeit >= start ODER < end. SANFTES ENDE: ab window.end keine NEUEN

  /flow mehr; laufende NICHT killen, zu Ende fuehren. Busy-Erkennung (S-190) verhindert

  Doppel-Trigger bereits bearbeiteter Projekte. enabled=false -> idle.

  '
