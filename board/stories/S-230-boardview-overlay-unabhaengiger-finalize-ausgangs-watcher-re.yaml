notes: 'Spec: docs/specs/idea-specify-background-status.md AC3,AC4,AC5,AC6 (Owner-Entscheidung
  2026-07-01: Hintergrund-Lauf sichtbar machen, kombinierte Variante -- Karten-Badge
  UND Reopen-Inline-Status). Frontend-Teil; depends S-237 (idea-keyed Read-Endpunkte)
  + S-229 (fire-and-forget-Close des Modals).


  Kontext: Nach S-229 schliesst das Overlay bei "Story anlegen" sofort (fire-and-forget),
  der Finalize-Lauf laeuft detached weiter. Board aktualisiert bisher NUR ueber reloadToken
  (onSpecified / lockedProject-Wechsel), KEIN periodischer Poll (verifiziert in BoardView.jsx/CockpitView.jsx).
  Der Owner will sehen, ob "noch laeuft" vs. "fehlgeschlagen" -- beides sieht sonst
  gleich aus (Idee bleibt status:Idee).


  GEAENDERT client/src/BoardView.jsx:
  - Idee-Karte: Lauf-Badge/Spinner "wird spezifiziert..." solange Job running (AC3;
  nicht nur farblich, aria-busy/role=status). Bei failed/auth-expired -> nicht-blockierender
  Fehler-Hinweis "Spezifizieren fehlgeschlagen - erneut versuchen", Karte bleibt anklickbar
  (AC4). Bei done -> kein Badge (Karte uebernommen/verschwunden oder auf Done archiviert).
  - Hydratisieren + Polling: GET .../specify/jobs (aus S-237) beim Board-Load lesen;
  leichtgewichtig pollen solange >=1 Idee running ODER direkt nach "Story anlegen"-Ausloesung;
  KEIN Poll wenn keine Idee aktiv (AC5). Verschwindet ein running-Job aus dem Snapshot
  (-> done) -> genau EIN Re-Fetch ueber bestehenden reloadToken/onSpecified-Mechanismus
  -> neue To-Do-Story ohne manuellen Reload. Reload-fest (Status aus Server-Registry,
  nicht Client-State).


  GEAENDERT client/src/IdeaSpecifyChatModal.jsx:
  - Beim Oeffnen GET .../ideas/:id/specify/status abfragen (AC6): running -> inline
  Status-Banner "Ein Spezifizieren-Lauf laeuft noch..." + "Story anlegen" deaktiviert
  (kein zweiter Lauf, AC7 aus S-237); failed/auth-expired -> inline Fehler-Banner +
  Retry; null/done -> normaler Chat-Einstieg. Secret-/pfad-frei. Das fire-and-forget-Schliessen
  selbst bleibt S-229 (nicht hier erneut anfassen).


  Kein neuer Board-Schreibpfad. Kein claude-/Agenten-Aufruf (nur lokale Reads).


  Gate: BoardView-Tests -- running-Badge sichtbar, failed-Hinweis an Karte, done ->
  Re-Fetch (neue Story erscheint), kein Dauer-Poll im Ruhezustand, reload-fest. Modal-Tests
  -- Reopen zeigt running/failed inline, "Story anlegen" bei running deaktiviert. Kein
  Regress an Bubble-/A11y-/readyToSpecify-Gating.'
