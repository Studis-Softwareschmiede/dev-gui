id: F-073
title: 'Per-App-GPG-Passphrasen: automatische Provisionierung & sichere Zwei-Phasen-Rotation'
goal: Jede von der Fabrik angelegte App bekommt eine eigene, kryptografisch starke
  GPG-Passphrase statt der geteilten Fabrik-Passphrase (Doktrin-Wechsel, Owner 2026-07-13).
  dev-gui provisioniert sie automatisch bei Projektanlage (idempotent, existierendes
  Bitwarden-Item wird nie überschrieben) und per Nach-Provisionierungs-Knopf für Bestands-Apps,
  reicht sie dem Scaffold via GPG_PASS_FILE durch (GE4) und rotiert sie im Zwei-Phasen-Muster
  (beweisen, umschalten, alt erst am Schluss weg). agent-flow bleibt Bitwarden-agnostisch;
  der Zugang verlässt dev-gui nie. Löst die Bonus-Lücke (Deploy-Formular-Default env.gpg-passphrase-<slug>)
  mit.
