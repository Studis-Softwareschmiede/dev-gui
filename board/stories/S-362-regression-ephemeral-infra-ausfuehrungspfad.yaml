notes: 'Ausgegliedert aus S-326 (Befund A, dort verifiziert): der RegressionRunner
  hat für target ephemeral-infra KEINEN Ausführungspfad — kein rtest-*-Namensschema,
  kein Cleanup, die Suite lief nie. Bis S-309/S-326 las der Runner `target` je Suite
  gar nicht und behandelte jeden Lauf als local; das erklärt, warum der VPS-Lauf des
  Owners vom 2026-07-08 nie einen Hetzner-Server anlegte (keine Kosten). S-326 hat
  NUR die Diagnose-Pflicht gelandet (AC10) + die target-Weiche (AC11): eine ephemeral-infra-Suite
  endet seither als ehrlicher, persistierter Fehler „Testobjekt ephemeral-infra wird
  noch nicht unterstützt" statt still als local-Lauf. Diese Story baut den echten
  Pfad — Korrektur (Review-Fix Iteration 1, verifiziert gegen agent-flow regression-playwright-conventions
  AC4): NICHT `VpsProvisioner` (src/VpsProvisioner.js ist SSH-Key-Management/authorized_keys,
  kein Server-Create) — die Provisionierung/ der Abbau des rtest-*-Wegwerf-Ziels lebt
  VERBINDLICH fixture-scoped INNERHALB der einzelnen Playwright-Suite (try/finally
  je Test, s. tests/regression/vps/*.spec.ts, die ihren rtest-*-Server über die dev-gui-eigene
  VPS-UI anlegt/abbaut) — dev-gui definiert diese Leitplanken nicht neu. Der Runner
  selbst lässt die Suite laufen (REGRESSION_BASE_URL analog local, OHNE lokale Erreichbarkeitsprüfung/Frisch-Ausrollen)
  und trägt ZUSÄTZLICH ein best-effort Sicherheitsnetz bei: nach jedem Lauf-Ausgang
  (passed/failed/error/Timeout/interner Fehler) fegt er über VpsProviderRegistry und
  löscht jede Maschine mit rtest-*-Präfix — GARANTIERT, auch im Fehler-, Timeout-
  und Abbruch-Pfad (sonst verwaiste, kostenpflichtige Server), und garantiert VOR
  der Lock-Freigabe (sonst Race mit einem sofort gestarteten Folgelauf desselben Projekts,
  Review-Fix Iteration 2). Bindend: agent-flow `regression-runner` AC4/AC7/AC8 (Infra-Leitplanken,
  Produktiv-Allowlist, Cleanup-Garantie) — dev-gui spiegelt das Modell, definiert
  es NICHT neu. Der Kosten-/Ressourcen-Hinweis im Dialog (AC6) steht bereits. Vorhandene
  Suiten als Testobjekt: tests/regression/vps/ (3 Suiten, target ephemeral-infra).
  Beim Landen: A3 in docs/specs/regression-run.md von „Umsetzungsstand NICHT gebaut"
  auf gebaut umstellen und die AC11-Weiche für ephemeral-infra vom Fehler- auf den
  Ausführungspfad umhängen. Achtung Nicht-Ziel: target url (A4) bleibt weiterhin ungebaut
  — separat halten.'
