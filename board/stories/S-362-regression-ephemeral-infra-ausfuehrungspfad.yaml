notes: 'Ausgegliedert aus S-326 (Befund A, dort verifiziert): der RegressionRunner
  hat für target ephemeral-infra KEINEN Ausführungspfad — kein VpsProvisioner-Aufruf,
  kein rtest-*-Namensschema, kein Cleanup. Bis S-309/S-326 las der Runner `target`
  je Suite gar nicht und behandelte jeden Lauf als local; das erklärt, warum der
  VPS-Lauf des Owners vom 2026-07-08 nie einen Hetzner-Server anlegte (keine Kosten).
  S-326 hat NUR die Diagnose-Pflicht gelandet (AC10) + die target-Weiche (AC11): eine
  ephemeral-infra-Suite endet seither als ehrlicher, persistierter Fehler „Testobjekt
  ephemeral-infra wird noch nicht unterstützt" statt still als local-Lauf. Diese Story
  baut den echten Pfad: target ephemeral-infra -> rtest-*-Wegwerf-Ziel provisionieren
  (VpsProvisioner, src/VpsProvisioner.js), Suite dagegen laufen lassen, Ziel danach
  GARANTIERT abbauen — auch im Fehler-, Timeout- und Prozess-Abbruch-Pfad (sonst
  verwaiste, kostenpflichtige Server). Bindend: agent-flow `regression-runner` AC4/AC7/AC8
  (Infra-Leitplanken, Produktiv-Allowlist, Cleanup-Garantie) — dev-gui spiegelt das
  Modell, definiert es NICHT neu. Der Kosten-/Ressourcen-Hinweis im Dialog (AC6) steht
  bereits. Vorhandene Suiten als Testobjekt: tests/regression/vps/ (3 Suiten, target
  ephemeral-infra). Beim Landen: A3 in docs/specs/regression-run.md von „Umsetzungsstand
  NICHT gebaut" auf gebaut umstellen und die AC11-Weiche für ephemeral-infra vom
  Fehler- auf den Provisionier-Pfad umhängen. Achtung Nicht-Ziel: target url (A4)
  bleibt weiterhin ungebaut — separat halten.'
