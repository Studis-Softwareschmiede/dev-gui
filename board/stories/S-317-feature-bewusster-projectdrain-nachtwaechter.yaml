notes: 'Neu B des Owner-Konzepts (FINAL 2026-07-07). Spec docs/specs/feature-aware-drain.md
  (AC1–AC8). Kern: ProjectDrain (manueller Knopf) UND NightWatchScheduler (Nachtwächter)
  wählen den Modus je Drain-Runde auf Feature-Ebene — hat das Parent-Feature der nächsten
  bereiten To-Do-Story >=2 bereite Storys, wird board-feature-drain.sh F-### als headless
  Kindprozess gestartet (kein PTY-Write, argv-Array, F-### gegen ^F-\d+$ validiert,
  kein API-Key in Child-Env); genau 1 bereite Story (oder Story ohne parent) -> /agent-flow:flow
  wie bisher. „Bereit" = bestehende Drain-Ziel-/ready-Regel (computeStoryReadyStatus,
  taktgeber-nachtwaechter AC1/AC3), NICHT neu definiert. Ein Feature-Drain = eine
  Drain-Runde, danach Re-Scan; Abbruch-/Konvergenz-Regel (AC2) unverändert. Leitplanken
  UNVERÄNDERT auch für Feature-Drains: ProjectJobLock max 1/Projekt, TokenLimitWatcher,
  Nacht-Budget-Schutz (night-budget-guard), Eskalation nach 3x kein Fortschritt (limit-/budget-Pausen
  erhöhen den Zähler NIE), sanftes Ende am Fensterende. Skript-Lokalisierung via Plugin-Cache-Glob
  (Muster ensure-gh-auth.sh), kein hartkodierter Pfad; fehlt das Skript -> sauberer
  Einzel-/flow-Rückfall (graceful, auditiert). Bewusst verworfen: parallele Features,
  lebende Orchestratoren, Feature-PRs. dev-gui löst nur aus + überwacht; Skript +
  Effizienz liegen agent-flow-seitig. CROSS-REPO: umsetzbar erst nach agent-flow feature-batch-orchestration
  v2.'
