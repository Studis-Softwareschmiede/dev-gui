# Vorlage — von new-project nach .github/workflows/build.yml kopiert.
# Baut bei Push auf main ein Image und pusht nach ghcr.io — via eingebautem GITHUB_TOKEN
# (kein Push-Secret nötig). Typ-Spezifika stecken im Dockerfile.
# Security-Gate: secret-scan (gitleaks) MUSS grün sein, bevor das Image gebaut/gepusht wird.
name: build
on:
  workflow_dispatch:
  push:
    branches: [main]
    # Pfad-Filter (S-323): reine Board-State-/Doku-/Markdown-Commits (board/**, docs/**, **.md)
    # veraendern das Image nicht -> kein Lauf noetig. Sobald mindestens eine Datei ausserhalb
    # dieser Pfade betroffen ist (auch gemischt), startet GitHub den vollen Workflow wie bisher.
    # Sicherheitsnetz fuer die dadurch entfallende secret-scan-Abdeckung: .github/workflows/security.yml
    # faehrt woechentlich einen tiefen History-Scan ueber den kompletten Baum (nicht anfassen).
    paths-ignore:
      - 'board/**'
      - 'docs/**'
      - '**.md'
      - '.claude/**'
permissions:
  contents: read
  packages: write
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Secret-Scan (gitleaks)
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest detect --source=/repo --no-git --redact -v
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
  image:
    needs: [secret-scan, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}   # wird automatisch klein geschrieben
          tags: |
            type=raw,value=latest
            type=sha
      - id: build_version
        run: echo "build_version=$(TZ=Europe/Zurich date +'%y%m%d%H%M%S %Z')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.build_version.outputs.build_version }}
# Härtung später (train/teamLeader): Actions auf SHA pinnen.
