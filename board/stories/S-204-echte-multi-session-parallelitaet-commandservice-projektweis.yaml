notes: 'NEU GEFASST (2026-07-01, Owner-Challenge). Der urspruengliche Ansatz (interaktiven
  CommandService/globalen JobLock projektweise entkoppeln) ist OBSOLET und wird NICHT
  gebaut: er wuerde den zentralen interaktiven Terminal-Baustein umbauen (hohes Risiko)
  und mehrere gleichzeitige Claude-Instanzen ueber EINE interaktive PTY erzwingen.


  RICHTIGER Ansatz: Der Nachtwaechter-Drain (NightWatchScheduler/ProjectDrain) fuehrt
  die /flow-Laeufe NACHTS als parallele HEADLESS ''claude -p''-Prozesse aus (one-shot,
  non-interaktiv), authentifiziert ueber CLAUDE_CODE_OAUTH_TOKEN aus der host-.env
  (S-206). Jeder Lauf = eigener Prozess -> echte Gleichzeitigkeit bis maxParallel
  OHNE den interaktiven CommandService anzufassen. Der manuelle ''Board abarbeiten''-Knopf
  + das Terminal bleiben tagsueber beim interaktiven PTY-Weg (unveraendert).


  Ziel (Owner): das bezahlte Token-Kontingent nachts moeglichst ausschoepfen. Parallelitaet
  hilft, weil ein einzelner /flow-Lauf die Rate wegen Tool-/CI-/IO-Wartezeiten oft
  NICHT saettigt -> mehrere parallele Laeufe verwandeln mehr Budget in erledigte Stories.


  ABHAENGIGKEIT / BLOCKED-GRUND: Setzt den headless-''claude -p''-Ausfuehrungspfad
  voraus, der aktuell in einem parallelen Arbeitsstrang (F-035/F-036/F-037, S-206
  OAuth-Token, S-207 Headless-Reconcile-Runner) noch IN ARBEIT ist. Sobald der headless-Pfad
  steht: entblocken, ggf. splitten (Ausfuehrungs-Adapter ''claude -p'' im ProjectDrain
  + Parallel-Orchestrierung im Scheduler + Rate-/Konflikt-Verhalten mehrerer Prozesse
  auf demselben OAuth-Token pruefen). Zu klaeren beim Entblocken: max. sinnvolle Parallelitaet
  auf einem Abo-Token (Rate-Limits), Fehler-/Timeout-Handling headless, Audit je Lauf.'
