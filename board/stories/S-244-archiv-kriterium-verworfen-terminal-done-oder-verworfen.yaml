notes: 'Spec: docs/specs/board-feature-archive.md — implements AC9 (V7).


  Erweitert das BEREITS ausgelieferte Archiv-Feature (F-044, S-232/S-236 Done). Das
  Archivierbarkeits-Kriterium behandelt ''Verworfen'' wie ''Done'' als terminal: Feature
  archivierbar, wenn >=1 Story UND alle Stories terminal (status in {Done, Verworfen})
  UND nicht bereits archiviert. Eine Verworfen-Story blockiert das Archivieren NICHT
  mehr.


  Zwei konsistenzpflichtige Stellen:

  1. Backend: src/BoardWriter.js — archiveDoneFeatures (Auswahl der archivierbaren
  Features): allDone-Check von ''jede Story Done'' auf ''jede Story Done ODER Verworfen''.

  2. Frontend: client/src/BoardView.jsx — Buttonaktivierung + Bestaetigungs-Zaehlung
  (Zeile ~799: st.every(DONE_STATUSES...) -> terminale Menge Done|Verworfen).


  Beim Archivieren bleibt der Story-status UNVERAENDERT (Verworfen bleibt Verworfen,
  Done bleibt Done); nur archived/archived_at werden ergaenzt. Idempotenz + byte-genaues/atomares
  Schreiben (AC2) unveraendert. estimator/retro lesen weiter am Ort (filtern auf status:
  Done) — kein Datenverlust.


  Tests: Feature Done+Verworfen -> archivierbar; nur Verworfen -> archivierbar; Verworfen+To
  Do -> NICHT archivierbar; Story-status nach Archivierung unveraendert; Idempotenz.


  Hinweis: OPTIONAL/P3 (Owner-Punkt 5). Setzt voraus, dass Verworfen terminal gilt
  (konsistent mit S-243). Wird diese Story verworfen, bleibt eine Verworfen-Story
  ein Archiv-Blocker — dann board-feature-archive V7/AC9 zuruecknehmen.'
