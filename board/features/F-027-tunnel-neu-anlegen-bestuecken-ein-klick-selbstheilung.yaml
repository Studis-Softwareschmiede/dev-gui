id: F-027
title: Tunnel neu anlegen & bestuecken — Ein-Klick-Selbstheilung pro VPS (Capability
  B)
goal: 'Wenn der Cloudflare-Tunnel eines VPS extern geloescht wurde (Capability A erkennt
  das als tunnel-missing), soll der Owner ihn mit einem Klick wiederherstellen — OHNE
  VPS-Neubau, ohne manuelles Nachpflegen. Pro VPS ein Knopf, der in einem Rutsch:
  (1) neuen Cloudflare-Tunnel anlegt (createTunnel, devgui-<vps>), gespeicherte tunnelId
  in der VpsProviderRegistry aktualisiert + neues Token im CredentialStore ablegt;
  (2) neues Token per SSH auf den VPS schiebt: /etc/cloudflared/env ersetzen (TUNNEL_TOKEN=<neu>,
  0600 root:root) + cloudflared-Container neu starten; (3) managed Container des VPS
  auslesen (ps -> Label cloudflare.tunnel-hostname + Host-Port) und je Container Route
  am neuen Tunnel anlegen (addRoute) + CNAME setzen (createDnsRecord idempotent ->
  biegt bestehende CNAMEs um) ueber den geteilten atomaren Anlege-Pfad des DeployOrchestrator.
  Security-kritisch: Token NIE in Argv/Log/Audit/Response/WS; mutierend, Access +
  CRED_ADMIN_EMAILS + Audit-First + LockoutGuard.'
