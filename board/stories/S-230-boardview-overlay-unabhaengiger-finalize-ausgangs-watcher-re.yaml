notes: 'Spec: docs/specs/idea-specify-chat.md AC17 (v2). FOLGE-STORY zu S-229 (depends).
  OFFENE OWNER-ENTSCHEIDUNG: der Owner hat fire-and-forget explizit gewuenscht, aber
  die Richtung der Fehler-Sichtbarkeit NICHT bestaetigt -- diese Story ist die empfohlene,
  aber deferrable Antwort (Variante b). Vor /flow mit dem Owner bestaetigen ODER bewusst
  zurueckstellen.


  Da nach S-229 das Overlay bei "Story anlegen" sofort schliesst, verliert das UI
  den natuerlichen Moment fuer (a) Re-Fetch bei Job-Ende und (b) Fehler-Anzeige. Board
  aktualisiert aktuell NUR ueber reloadToken (onSpecified / lockedProject-Wechsel)
  -- KEIN periodischer Board-Poll (verifiziert in BoardView.jsx/CockpitView.jsx).
  Ohne diese Story erscheint die neue To-Do-Story erst nach manuellem Reload; ein
  No-Op/Fehler ist nur daran erkennbar, dass die Idee noch status:Idee ist.


  GEAENDERT client/src/BoardView.jsx: overlay-unabhaengiger Watcher fuer in-flight
  Finalize-Jobs (jobId + slug beim Fire-and-forget-Close nach oben reichen, z.B. neuer
  Callback onFinalizeStarted(slug, jobId); Watcher-State in BoardView, entkoppelt
  vom Modal-Lebenszyklus). Detached Poll des bestehenden GET .../specify/finalize/:jobId.
  Bei done -> setReloadToken hochzaehlen (bestehender Re-Fetch-Mechanismus, handleSpecified-Muster)
  -> neue To-Do-Story erscheint ohne manuellen Reload. Bei no-op/failed/auth-expired
  -> nicht-blockierender, secret-freier Hinweis an der betroffenen Idee-Karte ("letzter
  Versuch fehlgeschlagen - erneut spezifizieren"). Modal (S-229) muss dafuer den jobId
  nach oben geben statt ihn beim Schliessen zu verwerfen.


  Kein Backend-Change (nutzt bestehenden Status-Endpunkt). Watcher-Verlust bei Neustart
  = Nicht-Ziel (In-Memory, wie AC7).


  Gate: BoardView-Tests -- done-Poll loest Re-Fetch aus (neue Story erscheint), no-op/failed
  zeigt Hinweis an der Idee-Karte, Watcher entkoppelt vom Overlay (Overlay zu, Poll
  laeuft weiter). Kein Regress an bestehendem Board-Rendering/Idee-Karten/Spezifizieren-Trigger.'
