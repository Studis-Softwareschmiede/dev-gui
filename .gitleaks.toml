# .gitleaks.toml — Gitleaks-Konfiguration für dev-gui
#
# Warum test/ vom Secret-Scan ausgenommen ist:
#   Test-Fixtures verwenden per Konvention ausschliesslich Dummy-Credentials
#   (FAKE_*/TEST_*-Präfixe). Diese Werte sind hochentropische Base64-Strings,
#   die gitleaks als false positive meldet, weil sie strukturell wie echte
#   API-Keys aussehen — aber keinerlei Zugang zu Systemen gewähren.
#
#   WICHTIG: Echte Secrets gehören NIE in Testdateien. Diese Ausnahme gilt
#   ausschliesslich für Dummy-Fixtures. Code-Review stellt sicher, dass keine
#   echten Secrets unter dem Deckmantel "Test-Fixture" eingeschleust werden.
#   Produktivcode (src/, Dockerfile, server.js, scripts/ usw.) bleibt
#   vollständig gescannt — keine weiteren Pfadausnahmen.

[extend]
useDefault = true

[allowlist]
description = "Test-Fixtures und Spec-Dokumente: False-Positives"
# test/: Dummy-Credentials (FAKE_*/TEST_*-Praefixe)
# docs/specs/: Spec-Dokumente referenzieren PEM-Format-Marker als Bezeichner (kein Key-Material)
# board/stories/: Story-YAML referenziert PEM-Format-Marker in Beschreibungstexten (kein Key-Material)
# Beweise fuer False-Positive: In diesen Pfaden erscheinen ausschliesslich PEM-Header/Footer-
# Zeichenketten als Format-Bezeichner in Freitext/Markdown/YAML-Beschreibungen.
# Kein Base64-Key-Body ist vorhanden — nur die Marker-Zeilen selbst (die allein kein Secret ergeben).
paths = ['''test/''', '''docs/specs/''', '''board/stories/''']

[[allowlist.regexes]]
description = "PEM-Header/Footer als Format-Bezeichner in JSDoc-Kommentaren (src/githubAppToken.js) — kein Key-Material, nur Regex-Pattern und Doku-Backtick-Referenzen. Beweis: Zeile 40 enthaelt nur den Header-String in Backticks als JSDoc-Erlaeuterung; kein Base64-Body folgt."
regex = '''`-----BEGIN (RSA )?PRIVATE KEY-----`'''
