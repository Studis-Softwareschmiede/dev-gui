  WARUM DIESE STORY EXISTIERT: der Kerndefekt (F-082) wurde nicht trotz, sondern WEGEN
  der Tests ausgeliefert. test/vpsContainerRouter.test.js mockte den nicht existierenden
  Platzhalter getTunnelIdForHost (:551, :579, :609, :939) und grünte die Lücke damit
  zu; :1200 zementiert die Fehlannahme sogar ausdrücklich („Default-Registry hat KEIN
  getTunnelIdForHost"). Ergebnis: 7849 grüne Tests über einem Feature, das nie funktioniert
  hat. Ein Mock einer Methode, die es nicht gibt, testet nichts — er testet den Mock.
  Ohne diese Story wiederholt sich exakt derselbe Fehler beim nächsten Registry-Aufruf.

  UMSETZUNG: einen gemeinsamen Registry-Fake-Helfer für die Tests bereitstellen, der
  jede bereitgestellte Methode gegen die ECHTE Oberfläche von VpsProviderRegistry
  (src/vps/VpsProviderRegistry.js) prüft — z.B. Abgleich der Keys gegen VpsProviderRegistry.prototype.
  Eine Methode, die dort nicht existiert, lässt den Test FEHLSCHLAGEN statt still
  durchzuwinken. Reale Oberfläche laut Spec-Vertrag: listProviders, listAllMachines,
  start, stop, getMachineIp, listTargetRecords, getTargetRecord, delete, create, getProviderOptions.
  Die Tests der tunnelId-Auflösung (Update + Remove) auf diesen Helfer umstellen.

  NEGATIV-NACHWEIS (Teil des AC): ein Test, der belegt, dass ein Double mit einer
  erfundenen Methode (z.B. getTunnelIdForHost) die Vertragsprüfung auslöst — sonst
  ist der Vertrag selbst ungetestet. Zusätzlich grep-prüfbar: getTunnelIdForHost kommt
  repo-weit nicht mehr vor (heute: 8 Treffer, 7 davon Mocks in test/vpsContainerRouter.test.js,
  einer die typeof-Prüfung selbst — alle fallen mit S-359/S-360).

  SCOPE-GRENZE: nur die Registry-Doubles im Umfeld der Tunnel-Auflösung. KEIN repo-weiter
  Umbau aller Test-Doubles auf Vertragsbindung und keine Erweiterung auf andere Boundaries
  (VpsDockerControl, CloudflareApi, DeployOrchestrator) — falls dort dasselbe Muster
  auffällt, im Handoff vermerken statt eigenmächtig mitziehen. Erst nach S-359 umsetzbar
  (vorher existieren die zu bindenden Aufrufe noch nicht in ihrer Zielform).

