notes: 'Spec: docs/specs/idea-specify-chat.md AC10,AC11,AC14 (v2-Amendment, Owner-Live-Test
  2026-07-01). Behebt zwei UX-Fehler im Idee-Specify-Overlay (Screenshot + Code-Analyse
  bestaetigt).


  GEAENDERT client/src/IdeaSpecifyChatModal.jsx:

  - handleClose (~Z.122): blockierenden Guard `if (sending || finalizeState === "running")
  return;` ENTFERNEN -> Schliessen(X)/Esc/Backdrop rufen onClose IMMER auf (AC14).
  Fokus-Rueckgabe an triggerRef bleibt. Kein stilles Nicht-Reagieren mehr.

  - handleFinalize (~Z.228): FIRE-AND-FORGET -> bei 202 { jobId } sofort onClose()
  (AC10), KEIN Warten/Pollen im UI. Bei non-202 (409 Lock / 400 kein readyToSpecify
  / Netzwerkfehler) bleibt das Overlay offen + Fehler inline + Retry (AC11) -- Overlay
  schliesst NUR bei bestaetigtem Start.

  - Den overlay-gebundenen Finalize-Poll-useEffect (~Z.261-342, Poll bis status!==running
  inkl. onSpecified/onClose bei done) ENTFERNEN -- er entfaellt mit fire-and-forget.
  finalizeState/finalizeJobId/pollIntervalMs-Prop entsprechend zurueckbauen. Cancelled-Guard
  fuer den in-flight message-Fetch beibehalten (kein State-Update nach Unmount, AC14).


  AC15/AC16 (Idee bleibt Idee bis Job-Ausgang; Ausgang via Board-Zustand) sind by-design
  abgedeckt: kein Backend-Change, der detachte Finalizer + S-220-Sicherheitsnetz halten
  die Idee bis zum echten Ergebnis auf status:Idee. Reichere overlay-unabhaengige
  Benachrichtigung + Auto-Re-Fetch = Folge-Story S-230 (AC17).


  GEAENDERT client/src/__tests__/IdeaSpecifyChatModal.test.jsx: bestehende Tests,
  die das ALTE Blockier-/Poll-Verhalten pruefen, MUESSEN angepasst werden -- v.a.
  die AC10-done-Poll-Suite (onSpecified vor onClose bei done), die no-op/failed/auth-expired-Inline-Suiten
  und die "permanenter 404 -> terminal error"-Suite pruefen alle den entfallenden
  Poll-Loop. Neu: Schliessen waehrend sending/running schliesst wirklich (AC14); "Story
  anlegen" schliesst sofort bei 202 (AC10); 409/400 haelt Overlay offen + Retry (AC11).


  Gate: Frontend-Rendering/Interaktions-Tests (Close-immer, fire-and-forget-Close
  bei 202, non-202 haelt offen + Retry, kein State-Update nach Unmount). Kein Backend-Change.
  Kein Regress an Bubble-/A11y-/readyToSpecify-Gating-Verhalten.'
