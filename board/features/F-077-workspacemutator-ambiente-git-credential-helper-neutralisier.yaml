id: F-077
title: 'WorkspaceMutator: ambiente git-Credential-Helper neutralisieren (Push/Pull-Auth-Fix)'
goal: 'WorkspaceMutator injiziert den frischen GitHub-App-Token korrekt via GIT_ASKPASS,
  aber git konsultiert konfigurierte Credential-Helper VORHER. In dev-guis Container
  liefert der ambiente Helfer (gh auth git-credential) einen stale Token, wodurch
  Push/Pull mit ''Invalid username or token'' scheitert (live gegen sandbox-flutter,
  per-App-GPG-Rotation push-failed). Fix: bei allen mutierenden git-Kommandos den
  Helfer per Command-Scope-Flag (-c credential.helper= -c credential.https://github.com.helper=)
  neutralisieren, sodass ausschliesslich der GIT_ASKPASS-Token greift.'
