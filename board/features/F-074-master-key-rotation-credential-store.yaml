id: F-074
title: 'Master-Key-Rotation des Credential-Stores (Zwei-Phasen, datiertes Schlüssel-Archiv) — löst S-083'
goal: Den Master-Key des Credential-Stores (secrets.enc.json) sicher rotieren — dasselbe
  Zwei-Phasen-Muster wie die per-App-Passphrase: entschlüsseln mit alt, verschlüsseln in neue
  Datei, Round-trip-Verifikation, atomarer rename. Der alte Key wird nicht gelöscht, sondern
  datiert archiviert (Feld „Schlüssel-Archiv" im Bitwarden-Item dev-gui-master-key), solange
  alte S3/R2-GPG-Backups ihn brauchen; unmittelbar nach der Rotation frisches Off-Host-Backup
  mit neuem Key. Hebt den DEFERRED-Status von S-083 (#194) auf (Owner-Auftrag 2026-07-13).
