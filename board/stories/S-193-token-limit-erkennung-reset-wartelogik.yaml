notes: 'TokenLimitWatcher liest den PTY-Output KONTO-WEIT mit (Muster: PtyManager

  ''output''-Events) und parst Claudes Token-/Usage-Limit-Meldung samt Reset-Zeitpunkt.

  Bei erkanntem Limit: alle neuen /flow-Anstoesse pausieren bis Reset + 1 min Puffer,

  dann fortsetzen. Liegt der Reset NACH window.end -> nicht warten, stoppen (naechste

  Nacht). Edge-Cases: nicht parsebare/mehrdeutige Meldung -> KEIN Fehlalarm (weiter);

  Reset in Vergangenheit -> minimaler Puffer. Integriert in die ProjectDrain-Trigger-

  Gate (S-192). Audit der Pause. Konsumiert von Scheduler (S-195) + Knopf (S-196).

  '
