notes: 'Spec: docs/specs/feature-status-derivation.md — implements AC1–AC7.


  Reine read-only Backend-Aenderung im BoardAggregator (src/BoardAggregator.js). KEIN
  neuer Endpunkt, KEINE Board-Datei-Schreibvorgaenge, KEINE Frontend-Aenderung (BoardView
  rendert feature.status bereits via StatusBadge + isFeatureDone — profitiert automatisch).


  Ableitungsregel (Prioritaet von oben nach unten), angewandt in _readBoard direkt
  bei/nach computeRollup — ueberschreibt das aus dem YAML gelesene feature.status
  IMMER (persistiertes status:-Feld wird fuer die Anzeige nicht mehr gelesen; Entscheidung
  A der Spec):

  1. Idee-Stories vollstaendig ausschliessen (V1/AC1).

  2. Bleibt >=1 Blocked -> Feature = Blocked (hoechste Prio, V2/AC2).

  3. Sonst schwaechste Stufe: To Do < In Progress < In Review < Done (kleinster Index
  gewinnt, V3/AC3).

  4. Keine verbleibende Story (keine oder nur Idee) -> Backlog (V4/AC4, Entscheidung
  B).

  Unbekannter/fehlender Story-Status -> als schwaechste Stufe To Do behandeln (V6/AC6).
  Pseudo-Feature _orphaned bleibt status: null (AC7).


  Neue reine Funktion z.B. computeFeatureStatus(stories). Read-only-Garantie + Progress-Rollup
  "X/Y done" bleiben unveraendert (AC5). Unit-Tests fuer alle AC-Kombinationen (Idee-Ausschluss,
  Blocked-Prio, jede weakest-wins-Stufe, Backlog-Default, unbekannter Status, _orphaned).


  Nicht-Ziele: persistiertes status:-Feld entfernen; BoardWriter-Nachziehen; Progress-Rollup-Aenderung;
  Frontend/Badge.'
