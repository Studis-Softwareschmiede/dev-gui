id: F-086
title: Cloudflare-Edge-Cache nach jedem Deploy leeren
goal: 'Nach jedem erfolgreichen Deploy leert dev-gui den Cloudflare-Edge-Cache fuer
  den App-Hostname, damit Nutzer sofort die neue Oberflaeche sehen statt bis zu 4h
  die gecachte alte Version (cf-cache-status: HIT auf statische Bundles). Best-effort
  Abschlussschritt der Deploy-Saga (DeployOrchestrator), hostname-scoped Purge bevorzugt,
  purge_everything nur Fallback; nicht-Cloudflare-Deploys uebersprungen. Update-Pfad
  (F-080/F-082) und VPS-Rollout erhalten den Purge automatisch mit.'
