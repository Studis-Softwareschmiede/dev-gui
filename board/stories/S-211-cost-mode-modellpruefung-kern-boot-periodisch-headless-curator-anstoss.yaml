notes: 'Ehemalige Idee (Owner): "Cost Mode überprüfen — Modelle ändern sich im Hintergrund

  (z.B. Sonnet 5), Cost Mode muss immer wieder überprüft/angepasst werden."

  Formalisiert zu Spec docs/specs/cost-mode-model-check.md (requirement, 2026-07-01).


  Kern-Anteil (dev-gui-seitig): CostModeModelCheck-Boundary — beim Prozess-Boot

  (always-on, kein neuer Dienst) + periodisch (Tick-Muster ReconciliationJob) das

  Frische-Signal der agent-flow-Matrix (model-tiers.md last_curated) READ-ONLY lesen;

  Normalfall (frisch/innerhalb Cooldown) -> keinerlei Meldung (AC2). Drift -> kurze

  Meldung + headless-Anstoß des agent-flow-Curators (claude -p ''/agent-flow:train

  model-tiers'') über EIGENE HeadlessFlowRunner-/ProjectJobLock-Instanz (getrennt,

  Muster headless-reconcile-runner/headless-manual-drain); Job-Registry + Status-

  Endpunkt (GET /api/cost-mode/check/:checkId), Audit-First (AC3, AC7).


  WICHTIG (Scope, siehe Spec §Angenommene Interpretation A2/A3/A4/AC6): die maßgebliche

  Cost-Mode->Modell-Matrix + der Auswahlbarkeits-Filter (Ausschluss Mythos/Fable)

  liegen AGENT-FLOW-seitig (model-tier-curator.md, anderes Repo). dev-gui stößt nur

  an, mutiert model-tiers.md NICHT und führt keinen eigenen Live-Modell-Auswahlbarkeits-

  Check ein (dokumentierte Limitation A5). Alternative A (dev-gui mutiert selbst)

  verworfen.


  Dispatch-Auslöser (vor Cost-Mode-Übergabe an einen Drain) + Frontend-Meldung/

  Vorher-Nachher-Übersicht = separate Folge-Story S-228 (AC4, AC5, AC3-Frontend-Teil).

