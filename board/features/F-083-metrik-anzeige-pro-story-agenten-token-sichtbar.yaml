title: 'Metrik-Anzeige pro Story: Agenten + Token sichtbar'
goal: 'Die Story-Detailansicht zeigt pro Story, welche Agenten gearbeitet haben, wieviele
  Token je Agent verbraucht wurden und die Summe pro Story. Heute scheitert das dev-gui-seitig
  an zwei Defekten: (1) tok ist im Ledger ein Objekt {in,out,cache}, die Flow-Tabelle
  rendert es mit String(v) und zeigt ''[object Object]''; (2) der Leer-Zustand behauptet
  ''Vor Metrik-Erfassung abgeschlossen'', haengt aber nur an ended_at != null ohne
  Datumsvergleich — bei Projekten ohne Erfassung ist die Meldung falsch. Ergaenzt
  die agent-flow-Seite (S-069/S-070, PR #348), die die Daten erst entstehen laesst.'
