estimate_note: 'Container-zentrierte Ansicht pro VPS direkt in dev-gui (statt Portainer). Frontend (client/src/VpsView.jsx): je VPS-Zeile ein „Container"-Button → Übersicht der laufenden Container (Name, Status, Image, Port; managed mit cloudflare.tunnel-hostname-Label vs. unmanaged markiert) + Aktionen Start/Stop/Neustart/Logs/Entfernen; managed-Remove = voller Undeploy (Container + Cloudflare-Route via DeployOrchestrator.undeploy, Hostname aus Label) mit type-to-confirm + LockoutGuard; unmanaged-Remove = nur docker rm. Backend: neue Routen GET /api/vps/machines/:provider/*splat/containers (psAll), .../logs (read-only), POST .../containers/:id/(start|stop|restart), DELETE .../containers/:id; VpsDockerControl (src/deploy/VpsDockerControl.js) bekommt start/stop/restart/logs ergänzt (ps/psAll/rm/run/pull existieren), Container-ID-Validierung + Shell-Escaping wie rm. Floor: schreibende Docker-Kommandos nur in VpsDockerControl (R01/ADR-012); SSH-Key/CF-Token nie geleakt; mutierend hinter Access + CRED_ADMIN_EMAILS + Audit-First; managed-Remove mit protected-Hard-Block (422 protected-resource). Boundary-übergreifend (VpsView-UI + Router + VpsDockerControl-Erweiterung + DeployOrchestrator-Wiederverwendung) → ~L (~8 EP). depends S-150 (Server-Login/SSH muss funktionieren).'
