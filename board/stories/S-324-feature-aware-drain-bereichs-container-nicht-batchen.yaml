befund_2026_07_08: 'Erster Live-Einsatz des feature-aware-drain (S-317) legte einen
  Konzeptfehler offen: Er behandelte F-019 (agent-flow, Bereichs-Container rollen-agenten)
  als Batch-Feature → Branch feature/F-019, S-062 dort fertig+Done, aber Schwester-Story
  S-061 blockiert → Batch merged nie nach main (per Design wartet ein Feature auf
  ALLE Stories). S-062 (vom Owner angeforderte Optimierung) hing im Branch fest, musste
  manuell via PR #322 nach main geholt werden. WURZEL: Bereichs-Container-Features
  (die 1:1 zu areas.yaml gehören, titel beginnt mit Bereich/bereich-, sammeln open-ended
  Stories) sind NIE alle-fertig und dürfen NICHT gebatcht werden — sonst friert eine
  einzige blockierte Story alle fertigen Geschwister vom Deploy ein. FIX-RICHTUNG:
  selectDrainMode() darf Feature-Batch nur für ECHTE, abschliessbare Deliverable-Features
  wählen, nicht für Bereichs-Container. Heuristik-Kandidaten: Feature entspricht einem
  areas.yaml-Eintrag / Titel-Präfix Bereich / explizites Flag am Feature (z. B. kind:
  area-container vs deliverable). Bei Bereichs-Containern: pro-Story-Einzel-/flow
  wie bisher (jede Story einzeln nach main). Spec feature-aware-drain (AC1/AC2) entsprechend
  präzisieren.'
